<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA;--bg2:#F2F2F0;--card:#FFFFFF;--text:#1A1A1A;--text-sub:#6B6B6B;
  --text-light:#A3A3A3;--accent:#1A1A1A;--accent-soft:rgba(26,26,26,.06);
  --border:rgba(0,0,0,.06);--border-h:rgba(0,0,0,.1);
  --shadow:0 0 0 1px var(--border);--shadow-h:0 0 0 1px var(--border-h),0 4px 20px rgba(0,0,0,.06);
  --radius:10px;
  --font:'Pretendard','Noto Sans KR',sans-serif;
  --font-d:'DM Serif Display',serif;
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#111111;--bg2:#1A1A1A;--card:#1E1E1E;--text:#EBEBEB;--text-sub:#888;
  --text-light:#555;--accent:#EBEBEB;--accent-soft:rgba(235,235,235,.08);
  --border:rgba(255,255,255,.06);--border-h:rgba(255,255,255,.12);
  --shadow:0 0 0 1px var(--border);--shadow-h:0 0 0 1px var(--border-h),0 4px 20px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;transition:background .3s,color .3s;overflow-x:hidden;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:5px}
button{font-family:inherit;letter-spacing:inherit;cursor:pointer}

/* ── Nav ── */
nav{height:56px;position:sticky;top:0;z-index:100;background:var(--bg);transition:background .3s;border-bottom:1px solid var(--border)}
.n-inner{max-width:920px;width:100%;margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center}
.n-logo{font-family:var(--font-d);font-size:1.15rem;cursor:pointer;transition:opacity var(--tr)}
.n-logo:hover{opacity:.6}
.n-r{display:flex;align-items:center;gap:6px;margin-left:auto}
.n-ic{width:34px;height:34px;border-radius:7px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text-sub);transition:all var(--tr)}
.n-ic:hover{background:var(--accent-soft);color:var(--text)}
.user-pill{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:50px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all var(--tr);position:relative}
.user-pill:hover{border-color:var(--border-h);box-shadow:var(--shadow-h)}
.user-pill img{width:26px;height:26px;border-radius:50%;object-fit:cover}
.user-pill span{font-size:.78rem;font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border-h);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.12);overflow:hidden;min-width:160px;z-index:200}
.user-menu.open{display:block;animation:fin .15s ease}
.user-menu button{display:block;width:100%;padding:10px 16px;border:none;background:none;color:var(--text);font-size:.82rem;text-align:left;cursor:pointer;transition:background var(--tr);font-family:inherit;white-space:nowrap}
.user-menu button:hover{background:var(--accent-soft)}
.user-menu button.danger{color:#D4564A}

/* ── Pages ── */
.page{display:none}.page.on{display:block;animation:fin .35s ease}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Landing ── */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:40px 28px;text-align:center}
.landing-icon{font-size:2.4rem;margin-bottom:20px;opacity:.12;font-family:var(--font-d)}
.landing-title{font-family:var(--font-d);font-size:2.2rem;line-height:1.35;letter-spacing:-.02em;margin-bottom:10px}
.landing-sub{font-size:.88rem;color:var(--text-sub);font-weight:300;line-height:1.7;margin-bottom:36px;max-width:400px}
.login-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:50px;border:1px solid var(--border-h);background:var(--card);color:var(--text);font-size:.88rem;font-weight:500;transition:all var(--tr);box-shadow:var(--shadow)}
.login-btn:hover{border-color:var(--text);box-shadow:var(--shadow-h);transform:translateY(-1px)}
.login-btn svg{width:18px;height:18px;flex-shrink:0}
.landing-notice{margin-top:20px;font-size:.72rem;color:var(--text-light);font-weight:300;line-height:1.6}

/* ── Dashboard ── */
.dash{max-width:920px;margin:0 auto;padding:48px 28px 80px}
.dash-hello{font-family:var(--font-d);font-size:1.6rem;margin-bottom:6px;letter-spacing:-.02em}
.dash-sub{font-size:.84rem;color:var(--text-sub);font-weight:300;margin-bottom:36px}
.dash-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:48px}
.dash-card{flex:1;min-width:200px;padding:24px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.dash-card:hover{box-shadow:var(--shadow-h);transform:translateY(-2px)}
.dash-card-icon{font-size:1.3rem;margin-bottom:10px;opacity:.25}
.dash-card-title{font-size:.88rem;font-weight:600;margin-bottom:4px}
.dash-card-desc{font-size:.74rem;color:var(--text-light);font-weight:300;line-height:1.6}
.dash-link{display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--bg2);border-radius:var(--radius);margin-bottom:12px;font-size:.82rem;transition:all var(--tr)}
.dash-link:hover{background:var(--accent-soft)}
.dash-link-label{font-size:.68rem;color:var(--text-light);font-weight:500;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.dash-link-url{flex:1;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:300}
.dash-link-copy{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text-sub);font-size:.72rem;font-weight:500;transition:all var(--tr);flex-shrink:0}
.dash-link-copy:hover{border-color:var(--text);color:var(--text)}

/* ── Explore ── */
.explore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:20px}
.explore-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.explore-card:hover{box-shadow:var(--shadow-h);transform:translateY(-2px)}
.explore-card-img{width:100%;aspect-ratio:16/9;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.explore-card-img img{width:100%;height:100%;object-fit:cover}
.explore-card-body{padding:16px}
.explore-card-name{font-size:.9rem;font-weight:600;margin-bottom:3px}
.explore-card-desc{font-size:.74rem;color:var(--text-light);font-weight:300;line-height:1.5}
.explore-empty{text-align:center;padding:80px 20px;color:var(--text-light)}
.explore-empty div:first-child{font-size:2rem;opacity:.15;margin-bottom:12px}
.sec-t{font-size:.82rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 24px;border-radius:50px;font-size:.8rem;z-index:999;transition:transform .3s cubic-bezier(.4,0,.2,1);font-weight:400;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
.loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.spinner{width:20px;height:20px;border:2px solid var(--border-h);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .n-inner{padding:0 16px}
  .landing{padding:40px 20px}
  .landing-title{font-size:1.6rem}
  .dash{padding:24px 16px 60px}
  .dash-actions{flex-direction:column}
  .dash-card{min-width:auto}
}

footer{text-align:center;padding:32px;color:var(--text-light);font-size:.68rem;border-top:1px solid var(--border);margin-top:48px;font-weight:300}
</style>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChWTzVBURkusx3uY8x8-2mMNMzS8ZjkQQ",
    authDomain: "yana-3-3.firebaseapp.com",
    projectId: "yana-3-3",
    storageBucket: "yana-3-3.firebasestorage.app",
    messagingSenderId: "173326989265",
    appId: "1:173326989265:web:9445e2495a3dc695efd2f0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ─── State ───
  let currentUser = null;
  let userMenuOpen = false;

  // ─── DOM helpers ───
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  // ─── Theme ───
  (function(){
    if(localStorage.getItem('blog_theme')==='dark'){
      document.documentElement.setAttribute('data-theme','dark');
    }
  })();
  window.toggleTheme = function(){
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
    localStorage.setItem('blog_theme', isDark ? '' : 'dark');
    $('#themeBtn').textContent = isDark ? '◐' : '◑';
  };

  // ─── Toast ───
  let toastTimer;
  window.toast = function(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('on');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('on'), 2000);
  };

  // ─── Page nav ───
  window.showPage = function(id){
    $$('.page').forEach(p => p.classList.remove('on'));
    const pg = $('#pg-' + id);
    if(pg) pg.classList.add('on');
  };

  // ─── Auth ───
  window.doLogin = async function(){
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      if(e.code !== 'auth/popup-closed-by-user'){
        console.error(e);
        toast('로그인에 실패했어요');
      }
    }
  };

  window.doLogout = async function(){
    await signOut(auth);
    currentUser = null;
    userMenuOpen = false;
    showPage('landing');
    updateNav();
  };

  window.toggleUserMenu = function(){
    userMenuOpen = !userMenuOpen;
    const m = $('#userMenu');
    if(m) m.classList.toggle('open', userMenuOpen);
  };

  // Close user menu on outside click
  document.addEventListener('click', e => {
    if(userMenuOpen && !e.target.closest('.user-pill')){
      userMenuOpen = false;
      const m = $('#userMenu');
      if(m) m.classList.remove('open');
    }
  });

  function updateNav(){
    if(currentUser){
      $('#loginArea').innerHTML = `
        <div class="user-pill" onclick="toggleUserMenu()">
          <img src="${currentUser.photoURL || ''}" alt="" referrerpolicy="no-referrer">
          <span>${currentUser.displayName || '사용자'}</span>
          <div class="user-menu" id="userMenu">
            <button onclick="event.stopPropagation();goMyBlog()">내 블로그</button>
            <button onclick="event.stopPropagation();goExplore()">둘러보기</button>
            <button class="danger" onclick="event.stopPropagation();doLogout()">로그아웃</button>
          </div>
        </div>
      `;
    } else {
      $('#loginArea').innerHTML = '';
    }
  }

  // ─── Dashboard ───
  window.goMyBlog = function(){
    if(!currentUser) return;
    // Open the user's blog page (the actual blog app)
    const blogUrl = getBlogUrl(currentUser.uid);
    window.open(blogUrl, '_blank');
  };

  window.goEditBlog = function(){
    goMyBlog();
  };

  window.goExplore = function(){
    showPage('explore');
    loadExplore();
  };

  window.goHome = function(){
    if(currentUser){
      showPage('dash');
    } else {
      showPage('landing');
    }
  };

  function getBlogUrl(uid){
    // blog.html에 uid를 넘기는 구조
    const base = location.origin + location.pathname.replace(/\/[^/]*$/, '/');
    return base + 'blog.html?id=' + encodeURIComponent(uid);
  }

  function getShareUrl(uid){
    const base = location.origin + location.pathname.replace(/\/[^/]*$/, '/');
    return base + 'blog.html?id=' + encodeURIComponent(uid);
  }

  window.copyMyLink = function(){
    if(!currentUser) return;
    const url = getShareUrl(currentUser.uid);
    navigator.clipboard.writeText(url)
      .then(() => toast('블로그 링크를 복사했어요'))
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('블로그 링크를 복사했어요');
      });
  };

  // ─── Explore (public blog list) ───
  async function loadExplore(){
    const grid = $('#exploreGrid');
    const empty = $('#exploreEmpty');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light);font-size:.82rem">불러오는 중...</div>';
    empty.classList.add('hidden');

    try {
      const snap = await getDocs(collection(db, 'blogs'));
      const blogs = [];
      snap.forEach(d => {
        const data = d.data();
        // 공개 프로필이 있는 블로그만 표시
        if(data.profile && data.profile.public !== false){
          blogs.push({ uid: d.id, ...data.profile });
        }
      });

      grid.innerHTML = '';
      if(blogs.length === 0){
        empty.classList.remove('hidden');
        return;
      }

      blogs.forEach(blog => {
        const card = document.createElement('div');
        card.className = 'explore-card';
        card.onclick = () => window.open(getBlogUrl(blog.uid), '_blank');
        card.innerHTML = `
          <div class="explore-card-img">
            ${blog.cover ? `<img src="${blog.cover}" alt="">` : `<span style="font-size:1.4rem;opacity:.1;font-family:var(--font-d)">${blog.name?.charAt(0) || '?'}</span>`}
          </div>
          <div class="explore-card-body">
            <div class="explore-card-name">${blog.name || '이름 없는 블로그'}</div>
            <div class="explore-card-desc">${blog.desc || ''}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    } catch(e){
      console.error(e);
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light);font-size:.82rem">블로그 목록을 불러오지 못했어요</div>';
    }
  }

  // ─── Ensure user doc exists ───
  async function ensureUserBlog(user){
    const ref = doc(db, 'blogs', user.uid);
    const snap = await getDoc(ref);
    if(!snap.exists()){
      // 새 사용자 → 블로그 초기 데이터 생성
      await setDoc(ref, {
        profile: {
          name: user.displayName || '내 블로그',
          desc: '',
          cover: '',
          public: true,
        },
        createdAt: Date.now(),
      });
    }
  }

  // ─── Migrate legacy data ───
  // 레거시 마이그레이션 비활성화됨
  // 유다 님의 기존 데이터는 이미 마이그레이션 완료된 상태
  // 새 유저에게 레거시 데이터가 복사되는 문제가 있어 제거
  async function migrateLegacyIfNeeded(user){
    // 아무것도 하지 않음
    return;
  }

  // ─── Render dashboard ───
  function renderDash(){
    if(!currentUser) return;
    $('#dashName').textContent = (currentUser.displayName || '사용자') + '님';
    const url = getShareUrl(currentUser.uid);
    $('#myBlogUrl').textContent = url;
  }

  // ─── Auth state ───
  onAuthStateChanged(auth, async (user) => {
    // Hide loader
    const loader = $('#loader');
    if(loader){ loader.style.opacity='0'; setTimeout(()=>loader.style.display='none', 400); }

    if(user){
      currentUser = user;
      updateNav();

      // Ensure blog doc exists
      await ensureUserBlog(user);
      await migrateLegacyIfNeeded(user);

      // 로그인되면 바로 본인 블로그로 이동
      const blogUrl = getBlogUrl(user.uid);
      location.href = blogUrl;
    } else {
      currentUser = null;
      updateNav();
      showPage('landing');
    }
  });

  // Theme button init
  setTimeout(() => {
    const isDark = document.documentElement.getAttribute('data-theme')==='dark';
    $('#themeBtn').textContent = isDark ? '◑' : '◐';
  }, 0);
</script>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Nav -->
<nav>
  <div class="n-inner">
    <div class="n-logo" onclick="goHome()">Blog</div>
    <div class="n-r">
      <button class="n-ic" id="themeBtn" onclick="toggleTheme()" title="테마 전환">◐</button>
      <div id="loginArea"></div>
    </div>
  </div>
</nav>

<!-- Landing Page -->
<div class="page on" id="pg-landing">
  <div class="landing">
    <div class="landing-icon">B</div>
    <h1 class="landing-title">나만의 블로그를 만들어 보세요</h1>
    <p class="landing-sub">
      글, 시리즈, 캐릭터 페어, 프롬프트까지.<br>
      간편하게 기록하고, 링크 하나로 공유할 수 있어요.
    </p>
    <button class="login-btn" onclick="doLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 시작하기
    </button>
    <p class="landing-notice">무료로 사용할 수 있어요. 로그인하면 바로 블로그가 만들어져요.</p>
  </div>
</div>

<!-- Dashboard -->
<div class="page" id="pg-dash">
  <div class="dash">
    <h1 class="dash-hello" id="dashName">님</h1>
    <p class="dash-sub">무엇을 할까요?</p>

    <div class="dash-actions">
      <div class="dash-card" onclick="goMyBlog()">
        <div class="dash-card-icon">✏️</div>
        <div class="dash-card-title">블로그 열기</div>
        <div class="dash-card-desc">글을 쓰거나 블로그를 편집해요</div>
      </div>
      <div class="dash-card" onclick="goExplore()">
        <div class="dash-card-icon">🔍</div>
        <div class="dash-card-title">둘러보기</div>
        <div class="dash-card-desc">다른 사람들의 블로그를 구경해요</div>
      </div>
    </div>

    <div class="sec-t" style="margin-bottom:14px">내 블로그 링크</div>
    <div class="dash-link">
      <div class="dash-link-label">URL</div>
      <div class="dash-link-url" id="myBlogUrl">—</div>
      <button class="dash-link-copy" onclick="copyMyLink()">복사</button>
    </div>
  </div>
</div>

<!-- Explore -->
<div class="page" id="pg-explore">
  <div class="dash">
    <button onclick="goHome()" style="display:inline-flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text-light);cursor:pointer;border:none;background:none;margin-bottom:28px;transition:color .2s;font-family:inherit">
